<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Todo List Akademik - Fernanda Tri Prastya</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #ca8a04;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
        }

        h2 { margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            cursor: pointer;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-add { background: var(--primary); color: white; margin-top: 15px; width: 100%; }
        .btn-add:hover { background: #1d4ed8; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th { background: #f1f5f9; text-align: left; padding: 12px; font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-p1 { background: #fee2e2; color: #991b1b; }
        .badge-p2 { background: #fef9c3; color: #854d0e; }
        .badge-p3 { background: #dcfce7; color: #166534; }
        
        .status-selesai { text-decoration: line-through; color: #94a3b8; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        .stat-val { font-size: 1.5rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.8rem; color: #64748b; }

        .action-btns button { padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; }
        .btn-check { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-tasks"></i> Sistem Todo List Akademik</h1>
        <p>Mahasiswa: <strong>Fernanda Tri Prastya</strong> | NIM: 09011282530041</p>
    </header>

    <div class="stats-grid" id="statsContainer"></div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> Tambah Tugas Baru</h2>
        <form id="todoForm">
            <div class="grid-form">
                <div class="form-group">
                    <label>Kode Tugas (Unik)</label>
                    <input type="text" id="kode" placeholder="Contoh: PBO01" required>
                </div>
                <div class="form-group">
                    <label>Mata Kuliah</label>
                    <input type="text" id="matkul" placeholder="Nama Mata Kuliah" required>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Deskripsi</label>
                    <textarea id="deskripsi" rows="2" placeholder="Detail tugas..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Prioritas</label>
                    <select id="prioritas">
                        <option value="1">1 - Tinggi (★★★)</option>
                        <option value="2" selected>2 - Sedang (★★☆)</option>
                        <option value="3">3 - Rendah (★☆☆)</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-add">Simpan Tugas</button>
        </form>
    </div>

    <div class="card">
        <h2><i class="fas fa-list"></i> Daftar Tugas Akademik</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Mata Kuliah</th>
                        <th>Prioritas</th>
                        <th>Status</th>
